version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manus-agent-pro
    ports:
      - "3000:3000"
      - "5000:5000"
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - AGENT_NAME=${AGENT_NAME}
      - AGENT_VERSION=${AGENT_VERSION}
      - WORKSPACE_ROOT=/app/workspace
      - CHROMA_DB_PATH=/app/chroma_db
      - NODE_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./workspace:/app/workspace
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    depends_on:
      - db
    networks:
      - agent-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: manus-agent-db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-manus_agent}
      - MYSQL_USER=${MYSQL_USER:-agent}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-agent123}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: manus-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: manus-agent-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - agent-network
    restart: unless-stopped

volumes:
  db_data:
  redis_data:

networks:
  agent-network:
    driver: bridge
